# Deploy Platform Drop to Firebase Hosting on pushes to main.
# Add secrets in GitHub → Settings → Secrets and variables → Actions.

name: Firebase Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix functions

      - name: Build Next.js static export
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'michaels-web-game' }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: npm run build

      - name: Build Cloud Functions
        run: npm run build --prefix functions

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firebase-build
          path: |
            out
            functions/lib
            functions/package.json
            functions/package-lock.json
          retention-days: 1

  deploy:
    name: Deploy to Firebase
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: firebase-build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.19.1

      # Prefer FIREBASE_TOKEN; fall back to service account JSON via ADC.
      - name: Configure Firebase authentication
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "AUTH_METHOD=token" >> "$GITHUB_ENV"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            SA_PATH="${RUNNER_TEMP}/firebase-sa.json"
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$SA_PATH"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_PATH" >> "$GITHUB_ENV"
            echo "AUTH_METHOD=service_account" >> "$GITHUB_ENV"
          else
            echo "::error::Add FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT to GitHub repository secrets."
            exit 1
          fi

      - name: Deploy hosting, rules, and functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          DEPLOY_ARGS=(--project michaels-web-game --non-interactive)
          if [ "$AUTH_METHOD" = "token" ]; then
            firebase deploy "${DEPLOY_ARGS[@]}" --token "$FIREBASE_TOKEN"
          else
            firebase deploy "${DEPLOY_ARGS[@]}"
          fi
