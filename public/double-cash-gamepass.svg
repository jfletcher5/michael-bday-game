<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">2x Cash Gamepass</title>
  <desc id="desc">Coin stack with a 2x multiplier badge for the 2x Cash gamepass.</desc>
  <defs>
    <linearGradient id="coinStack" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe566" />
      <stop offset="100%" stop-color="#d4a017" />
    </linearGradient>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="48" fill="#1f2937" />
  <rect x="72" y="72" width="368" height="368" rx="36" fill="#111827" stroke="#fbbf24" stroke-width="8" />

  <!-- Stacked coins -->
  <ellipse cx="256" cy="340" rx="120" ry="28" fill="#8a6500" opacity="0.5" />
  <ellipse cx="256" cy="310" rx="118" ry="26" fill="url(#coinStack)" stroke="#8a6500" stroke-width="8" />
  <ellipse cx="256" cy="278" rx="116" ry="24" fill="url(#coinStack)" stroke="#8a6500" stroke-width="8" />
  <ellipse cx="256" cy="246" rx="114" ry="22" fill="url(#coinStack)" stroke="#8a6500" stroke-width="8" />

  <!-- 2x badge -->
  <circle cx="360" cy="176" r="72" fill="#22c55e" stroke="#14532d" stroke-width="10" />
  <text
    x="360"
    y="196"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="56"
    font-weight="900"
    fill="#ffffff"
  >2x</text>
</svg>
